<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSC 2027 Suite Meeting Scheduler</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; }
input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 3px; cursor: pointer; outline: none; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #e94560; cursor: pointer; border: 2px solid #1a1a2e; box-shadow: 0 0 8px #e9456066; }
input[type="range"]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #e94560; cursor: pointer; border: 2px solid #1a1a2e; }
select { -webkit-appearance: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const COLORS = {
  bg: "#1a1a2e", surface: "#16213e", surfaceLight: "#1e2d4a",
  accent: "#e94560", success: "#00b894", warning: "#fdcb6e",
  danger: "#e17055", text: "#eee", textDim: "#8899aa",
  border: "#2a3a5c", slotMorning: "#0a3d62", slotAfternoon: "#1e3a5f",
  lunch: "#e94560", blue: "#0984e3",
};

function Slider({ label, value, onChange, min, max, step = 1, unit = "", helpText }) {
  const pct = ((value - min) / (max - min)) * 100;
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
        <label style={{ fontSize: 13, color: COLORS.textDim, fontFamily: "'JetBrains Mono', monospace", textTransform: "uppercase", letterSpacing: "0.05em" }}>{label}</label>
        <span style={{ fontSize: 22, fontWeight: 700, color: COLORS.text, fontFamily: "'JetBrains Mono', monospace" }}>{value}{unit}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={(e) => onChange(Number(e.target.value))}
        style={{ background: `linear-gradient(to right, ${COLORS.accent} 0%, ${COLORS.accent} ${pct}%, ${COLORS.border} ${pct}%, ${COLORS.border} 100%)` }} />
      {helpText && <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 2, opacity: 0.7 }}>{helpText}</div>}
    </div>
  );
}

function StatCard({ label, value, sub, color = COLORS.text, large = false }) {
  return (
    <div style={{ background: COLORS.surfaceLight, borderRadius: 10, padding: large ? "16px 20px" : "12px 16px", border: `1px solid ${COLORS.border}`, flex: 1, minWidth: large ? 180 : 120 }}>
      <div style={{ fontSize: 11, color: COLORS.textDim, textTransform: "uppercase", letterSpacing: "0.08em", fontFamily: "'JetBrains Mono', monospace", marginBottom: 4 }}>{label}</div>
      <div style={{ fontSize: large ? 32 : 24, fontWeight: 800, color, fontFamily: "'JetBrains Mono', monospace", lineHeight: 1.1 }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 2 }}>{sub}</div>}
    </div>
  );
}

function Badge({ children, color = COLORS.accent }) {
  return (
    <span style={{ display: "inline-block", background: color + "22", color, border: `1px solid ${color}44`, borderRadius: 6, padding: "3px 10px", fontSize: 12, fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>{children}</span>
  );
}

function TimeSlotGrid({ slots, lunchAfterSlot, lunchDuration, morningBreakAfterSlot, morningBreakDuration, afternoonBreakAfterSlot, afternoonBreakDuration, startHour, startMin, meetingDuration, transitionDuration }) {
  const formatTime = (totalMin) => {
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    const ampm = h >= 12 ? "PM" : "AM";
    const h12 = h > 12 ? h - 12 : h === 0 ? 12 : h;
    return `${h12}:${m.toString().padStart(2, "0")} ${ampm}`;
  };
  let currentMin = startHour * 60 + startMin;
  const rendered = [];
  for (let i = 0; i < slots; i++) {
    if (morningBreakDuration > 0 && i === morningBreakAfterSlot) {
      rendered.push(
        <div key={`mbreak-${i}`} style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 0" }}>
          <div style={{ width: 28, height: 28, borderRadius: "50%", background: COLORS.warning + "33", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>☕</div>
          <div style={{ flex: 1, background: COLORS.warning + "10", border: `1px dashed ${COLORS.warning}44`, borderRadius: 6, padding: "6px 12px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 12, color: COLORS.warning, fontWeight: 600 }}>MORNING BREAK</span>
            <span style={{ fontSize: 11, color: COLORS.textDim, fontFamily: "'JetBrains Mono', monospace" }}>{formatTime(currentMin)} – {formatTime(currentMin + morningBreakDuration)}</span>
          </div>
        </div>
      );
      currentMin += morningBreakDuration;
    }
    if (i === lunchAfterSlot) {
      rendered.push(
        <div key={`lunch-${i}`} style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 0" }}>
          <div style={{ width: 28, height: 28, borderRadius: "50%", background: COLORS.lunch + "33", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>🍽</div>
          <div style={{ flex: 1, background: COLORS.lunch + "15", border: `1px dashed ${COLORS.lunch}44`, borderRadius: 6, padding: "6px 12px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 12, color: COLORS.lunch, fontWeight: 600 }}>LUNCH</span>
            <span style={{ fontSize: 11, color: COLORS.textDim, fontFamily: "'JetBrains Mono', monospace" }}>{formatTime(currentMin)} – {formatTime(currentMin + lunchDuration)}</span>
          </div>
        </div>
      );
      currentMin += lunchDuration;
    }
    if (afternoonBreakDuration > 0 && i === afternoonBreakAfterSlot) {
      rendered.push(
        <div key={`abreak-${i}`} style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 0" }}>
          <div style={{ width: 28, height: 28, borderRadius: "50%", background: COLORS.warning + "33", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>🧃</div>
          <div style={{ flex: 1, background: COLORS.warning + "10", border: `1px dashed ${COLORS.warning}44`, borderRadius: 6, padding: "6px 12px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 12, color: COLORS.warning, fontWeight: 600 }}>AFTERNOON BREAK</span>
            <span style={{ fontSize: 11, color: COLORS.textDim, fontFamily: "'JetBrains Mono', monospace" }}>{formatTime(currentMin)} – {formatTime(currentMin + afternoonBreakDuration)}</span>
          </div>
        </div>
      );
      currentMin += afternoonBreakDuration;
    }
    const slotStart = currentMin;
    const slotEnd = currentMin + meetingDuration;
    const isAM = slotStart < 12 * 60;
    rendered.push(
      <div key={`slot-${i}`} style={{ display: "flex", alignItems: "center", gap: 8, padding: "2px 0" }}>
        <div style={{ width: 28, height: 28, borderRadius: "50%", background: isAM ? COLORS.slotMorning : COLORS.slotAfternoon, border: `1px solid ${isAM ? "#1a5276" : "#2a4a7f"}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: COLORS.textDim, fontFamily: "'JetBrains Mono', monospace" }}>{i + 1}</div>
        <div style={{ flex: 1, background: (isAM ? COLORS.slotMorning : COLORS.slotAfternoon) + "66", borderRadius: 6, padding: "6px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", border: `1px solid ${COLORS.border}` }}>
          <span style={{ fontSize: 12, color: COLORS.text, fontWeight: 500 }}>Vendor Meeting</span>
          <span style={{ fontSize: 11, color: COLORS.textDim, fontFamily: "'JetBrains Mono', monospace" }}>{formatTime(slotStart)} – {formatTime(slotEnd)}</span>
        </div>
      </div>
    );
    currentMin = slotEnd + transitionDuration;
  }
  return <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>{rendered}</div>;
}

function App() {
  const [vendors, setVendors] = useState(45);
  const [delegates, setDelegates] = useState(70);
  const [groupSize, setGroupSize] = useState(4);
  const [meetingDuration, setMeetingDuration] = useState(15);
  const [transitionTime, setTransitionTime] = useState(5);
  const [startHour, setStartHour] = useState(9);
  const [startMin, setStartMin] = useState(0);
  const [endHour, setEndHour] = useState(14);
  const [endMin, setEndMin] = useState(30);
  const [lunchDuration, setLunchDuration] = useState(30);
  const [meetingDays, setMeetingDays] = useState(2);
  const [halfDay, setHalfDay] = useState(true);
  const [targetCoverage, setTargetCoverage] = useState(80);
  const [morningBreak, setMorningBreak] = useState(0);
  const [afternoonBreak, setAfternoonBreak] = useState(0);

  const calc = useMemo(() => {
    const totalMinutes = (endHour * 60 + endMin) - (startHour * 60 + startMin);
    const meetableMinutes = totalMinutes - lunchDuration - morningBreak - afternoonBreak;
    const slotDuration = meetingDuration + transitionTime;
    const properSlots = Math.floor((meetableMinutes + transitionTime) / slotDuration);
    const halfDayMinutes = (12 * 60) - (startHour * 60 + startMin);
    const halfDaySlots = halfDay ? Math.floor((halfDayMinutes + transitionTime) / slotDuration) : 0;
    const totalSlots = (properSlots * meetingDays) + halfDaySlots;
    const totalDaysLabel = halfDay ? `${meetingDays} full + ½` : `${meetingDays}`;
    const numGroups = Math.ceil(delegates / groupSize);
    const actualGroupSize = delegates / numGroups;
    const vendorsToVisit = Math.ceil(vendors * (targetCoverage / 100));
    const achievedCoverage = Math.min(100, (totalSlots / vendors) * 100);
    const feasible = totalSlots >= vendorsToVisit;
    const noonMin = 12 * 60;
    const dayStartMin = startHour * 60 + startMin;
    // Find best lunch slot (closest to noon)
    let bestLunchSlot = 1;
    let bestDelta = Infinity;
    for (let s = 1; s < properSlots; s++) {
      const lunchStartIfAfterSlot = dayStartMin + s * slotDuration;
      const delta = Math.abs(lunchStartIfAfterSlot - noonMin);
      if (delta < bestDelta) { bestDelta = delta; bestLunchSlot = s; }
    }
    const lunchAfterSlot = bestLunchSlot;
    // Find morning break slot (target 10:30 AM), must be before lunch
    let morningBreakAfterSlot = -1;
    if (morningBreak > 0 && lunchAfterSlot > 1) {
      let bDelta = Infinity;
      const morningTarget = 10 * 60 + 30;
      for (let s = 1; s < lunchAfterSlot; s++) {
        const breakStart = dayStartMin + s * slotDuration;
        const d = Math.abs(breakStart - morningTarget);
        if (d < bDelta) { bDelta = d; morningBreakAfterSlot = s; }
      }
    }
    // Find afternoon break slot (target 3:00 PM), must be after lunch
    let afternoonBreakAfterSlot = -1;
    if (afternoonBreak > 0 && properSlots > lunchAfterSlot + 1) {
      let bDelta = Infinity;
      const afternoonTarget = 15 * 60;
      for (let s = lunchAfterSlot + 1; s < properSlots; s++) {
        const breakStart = dayStartMin + s * slotDuration + lunchDuration + morningBreak;
        const d = Math.abs(breakStart - afternoonTarget);
        if (d < bDelta) { bDelta = d; afternoonBreakAfterSlot = s; }
      }
    }
    const canAllMeetSimultaneously = numGroups <= vendors;
    const totalMeetingTime = properSlots * meetingDuration + (properSlots - 1) * transitionTime + lunchDuration + morningBreak + afternoonBreak;
    const actualEndMin = dayStartMin + totalMeetingTime;
    const actualEndH = Math.floor(actualEndMin / 60);
    const actualEndM = actualEndMin % 60;
    const halfDayMeetingTime = halfDaySlots > 0 ? halfDaySlots * meetingDuration + (halfDaySlots - 1) * transitionTime : 0;
    const halfDayEndMin = dayStartMin + halfDayMeetingTime;
    const halfDayEndH = Math.floor(halfDayEndMin / 60);
    const halfDayEndM = halfDayEndMin % 60;
    const spareSlots = totalSlots - vendorsToVisit;
    return { totalMinutes, meetableMinutes, slotsPerDay: properSlots, halfDaySlots, totalSlots, totalDaysLabel, numGroups, actualGroupSize: Math.round(actualGroupSize * 10) / 10, vendorsToVisit, achievedCoverage: Math.round(achievedCoverage * 10) / 10, feasible, lunchAfterSlot, morningBreakAfterSlot, afternoonBreakAfterSlot, canAllMeetSimultaneously, actualEndH, actualEndM, halfDayEndH, halfDayEndM, spareSlots };
  }, [vendors, delegates, groupSize, meetingDuration, transitionTime, startHour, startMin, endHour, endMin, lunchDuration, meetingDays, halfDay, targetCoverage, morningBreak, afternoonBreak]);

  const formatEndTime = () => {
    const h = calc.actualEndH;
    const m = calc.actualEndM;
    const ampm = h >= 12 ? "PM" : "AM";
    const h12 = h > 12 ? h - 12 : h === 0 ? 12 : h;
    return `${h12}:${m.toString().padStart(2, "0")} ${ampm}`;
  };
  const fmtHalfEnd = () => {
    const h = calc.halfDayEndH;
    const m = calc.halfDayEndM;
    const ampm = h >= 12 ? "PM" : "AM";
    const h12 = h > 12 ? h - 12 : h === 0 ? 12 : h;
    return `${h12}:${m.toString().padStart(2, "0")} ${ampm}`;
  };

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, color: COLORS.text, fontFamily: "'Segoe UI', -apple-system, sans-serif", padding: "24px 20px" }}>
      <div style={{ maxWidth: 900, margin: "0 auto" }}>
        <div style={{ marginBottom: 28 }}>
          <div style={{ fontSize: 11, color: COLORS.accent, textTransform: "uppercase", letterSpacing: "0.15em", fontFamily: "'JetBrains Mono', monospace", marginBottom: 4 }}>CSC 2027 Conference</div>
          <h1 style={{ fontSize: 28, fontWeight: 800, margin: 0, lineHeight: 1.2, color: COLORS.text }}>Suite Meeting Scheduler</h1>
          <p style={{ fontSize: 14, color: COLORS.textDim, margin: "6px 0 0", lineHeight: 1.5 }}>Drag the sliders to model different meeting configurations. The math updates live.</p>
        </div>

        {/* Feasibility Banner */}
        <div style={{ background: (calc.feasible ? COLORS.success : COLORS.danger) + "15", border: `1px solid ${(calc.feasible ? COLORS.success : COLORS.danger)}44`, borderRadius: 10, padding: "14px 20px", marginBottom: 20, display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ fontSize: 28 }}>{calc.feasible ? "✅" : "⛔"}</div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 15, color: calc.feasible ? COLORS.success : COLORS.danger }}>
              {calc.feasible ? `Feasible — ${calc.totalSlots} slots available, ${calc.vendorsToVisit} needed (${calc.spareSlots} buffer slots)` : `Not feasible — need ${calc.vendorsToVisit} slots but only have ${calc.totalSlots}`}
            </div>
            <div style={{ fontSize: 12, color: COLORS.textDim, marginTop: 2 }}>
              {calc.feasible ? `Each delegate group visits ${calc.vendorsToVisit} of ${vendors} vendors across ${calc.totalDaysLabel} days. ${calc.spareSlots > 0 ? "Buffer slots allow for breaks, no-shows, or extended meetings." : "No buffer — very tight schedule."}` : "Try shorter meetings, more days, or a wider time window."}
            </div>
          </div>
        </div>

        {/* Stats */}
        <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: 24 }}>
          <StatCard label="Slots / Day" value={calc.slotsPerDay} sub={`${calc.totalSlots} total over ${calc.totalDaysLabel} days`} />
          <StatCard label="Delegate Groups" value={calc.numGroups} sub={`~${calc.actualGroupSize} per group`} />
          <StatCard label="Coverage" value={`${calc.achievedCoverage}%`} color={calc.achievedCoverage >= targetCoverage ? COLORS.success : COLORS.danger} sub={`${calc.vendorsToVisit} of ${vendors} vendors`} />
          <StatCard label="Last Meeting Ends" value={formatEndTime()} sub={halfDay ? `Half day ends ${fmtHalfEnd()}` : `${calc.meetableMinutes} min of meetings`} />
        </div>

        {/* Two Column */}
        <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
          {/* Controls */}
          <div style={{ flex: "1 1 320px", minWidth: 300 }}>
            <div style={{ background: COLORS.surface, borderRadius: 12, border: `1px solid ${COLORS.border}`, padding: 20, marginBottom: 16 }}>
              <h3 style={{ margin: "0 0 16px", fontSize: 13, color: COLORS.accent, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "'JetBrains Mono', monospace" }}>Conference Parameters</h3>
              <Slider label="Exhibitor Booths" value={vendors} onChange={setVendors} min={30} max={60} helpText="Vendor suites available" />
              <Slider label="Total Delegates" value={delegates} onChange={setDelegates} min={40} max={120} helpText="Member attendees to schedule" />
              <Slider label="Group Size" value={groupSize} onChange={setGroupSize} min={2} max={8} helpText={`Creates ${calc.numGroups} groups of ~${calc.actualGroupSize}`} />
              <Slider label="Target Coverage" value={targetCoverage} onChange={setTargetCoverage} min={50} max={100} step={5} unit="%" helpText={`Each group visits ${calc.vendorsToVisit} vendors`} />
            </div>
            <div style={{ background: COLORS.surface, borderRadius: 12, border: `1px solid ${COLORS.border}`, padding: 20, marginBottom: 16 }}>
              <h3 style={{ margin: "0 0 16px", fontSize: 13, color: COLORS.accent, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "'JetBrains Mono', monospace" }}>Time Configuration</h3>
              <Slider label="Meeting Duration" value={meetingDuration} onChange={setMeetingDuration} min={8} max={25} unit=" min" helpText="Time with each vendor" />
              <Slider label="Transition Time" value={transitionTime} onChange={setTransitionTime} min={3} max={10} unit=" min" helpText="Walking between suites" />
              <Slider label="Lunch Duration" value={lunchDuration} onChange={setLunchDuration} min={20} max={45} step={5} unit=" min" />
              <Slider label="Morning Break" value={morningBreak} onChange={setMorningBreak} min={0} max={20} step={5} unit=" min" helpText={morningBreak === 0 ? "Off — set above 0 to add a break ~10:30 AM" : calc.morningBreakAfterSlot >= 0 ? `≈ 10:30 AM break, after slot ${calc.morningBreakAfterSlot}` : "No room before lunch for a morning break"} />
              <Slider label="Afternoon Break" value={afternoonBreak} onChange={setAfternoonBreak} min={0} max={20} step={5} unit=" min" helpText={afternoonBreak === 0 ? "Off — set above 0 to add a break ~3:00 PM" : calc.afternoonBreakAfterSlot >= 0 ? `≈ 3:00 PM break, after slot ${calc.afternoonBreakAfterSlot}` : "No room after lunch for an afternoon break"} />
              <Slider label="Full Meeting Days" value={meetingDays} onChange={setMeetingDays} min={1} max={3} helpText="Days with full meeting windows" />

              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                <div onClick={() => setHalfDay(!halfDay)} style={{ width: 44, height: 24, borderRadius: 12, background: halfDay ? COLORS.accent : COLORS.border, cursor: "pointer", position: "relative", transition: "background 0.2s", flexShrink: 0 }}>
                  <div style={{ width: 18, height: 18, borderRadius: "50%", background: "#fff", position: "absolute", top: 3, left: halfDay ? 23 : 3, transition: "left 0.2s" }} />
                </div>
                <div>
                  <div style={{ fontSize: 13, color: COLORS.text, fontWeight: 500 }}>Half day (last day)</div>
                  <div style={{ fontSize: 11, color: COLORS.textDim }}>{halfDay ? `Meetings until noon — adds ${calc.halfDaySlots} slots` : "No half day"}</div>
                </div>
              </div>

              <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${COLORS.border}` }}>
                <div style={{ fontSize: 12, color: COLORS.textDim, marginBottom: 8, fontFamily: "'JetBrains Mono', monospace", textTransform: "uppercase", letterSpacing: "0.05em" }}>Daily Window</div>
                <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: 11, color: COLORS.textDim }}>Start</label>
                    <select value={`${startHour}:${startMin}`} onChange={(e) => { const [h, m] = e.target.value.split(":").map(Number); setStartHour(h); setStartMin(m); }}
                      style={{ width: "100%", padding: 8, background: COLORS.surfaceLight, color: COLORS.text, border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 14, fontFamily: "'JetBrains Mono', monospace" }}>
                      {[7,8,9,10,11,12,13].map(h => [0,30].map(m => <option key={`${h}:${m}`} value={`${h}:${m}`}>{(h > 12 ? h - 12 : h)}:{m.toString().padStart(2,"0")} {h >= 12 ? "PM" : "AM"}</option>))}
                    </select>
                  </div>
                  <div style={{ color: COLORS.textDim, paddingTop: 16 }}>→</div>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: 11, color: COLORS.textDim }}>End</label>
                    <select value={`${endHour}:${endMin}`} onChange={(e) => { const [h, m] = e.target.value.split(":").map(Number); setEndHour(h); setEndMin(m); }}
                      style={{ width: "100%", padding: 8, background: COLORS.surfaceLight, color: COLORS.text, border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 14, fontFamily: "'JetBrains Mono', monospace" }}>
                      {[12,13,14,15,16,17,18,19,20].map(h => [0,5,10,15,20,25,30,35,40,45,50,55].map(m => <option key={`${h}:${m}`} value={`${h}:${m}`}>{(h > 12 ? h - 12 : h)}:{m.toString().padStart(2,"0")} {h >= 12 ? "PM" : "AM"}</option>))}
                    </select>
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Schedule Visual */}
          <div style={{ flex: "1 1 360px", minWidth: 320 }}>
            <div style={{ background: COLORS.surface, borderRadius: 12, border: `1px solid ${COLORS.border}`, padding: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                <h3 style={{ margin: 0, fontSize: 13, color: COLORS.accent, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "'JetBrains Mono', monospace" }}>Full Day Schedule (per group)</h3>
                <Badge color={COLORS.blue}>{calc.slotsPerDay} slots</Badge>
              </div>
              <TimeSlotGrid slots={calc.slotsPerDay} lunchAfterSlot={calc.lunchAfterSlot} lunchDuration={lunchDuration} morningBreakAfterSlot={calc.morningBreakAfterSlot} morningBreakDuration={morningBreak} afternoonBreakAfterSlot={calc.afternoonBreakAfterSlot} afternoonBreakDuration={afternoonBreak} startHour={startHour} startMin={startMin} meetingDuration={meetingDuration} transitionDuration={transitionTime} />

              {halfDay && calc.halfDaySlots > 0 && (
                <div style={{ marginTop: 16, paddingTop: 16, borderTop: `1px dashed ${COLORS.border}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                    <h3 style={{ margin: 0, fontSize: 13, color: COLORS.warning, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "'JetBrains Mono', monospace" }}>Half Day (Last Day — no lunch)</h3>
                    <Badge color={COLORS.warning}>{calc.halfDaySlots} slots</Badge>
                  </div>
                  <TimeSlotGrid slots={calc.halfDaySlots} lunchAfterSlot={-1} lunchDuration={lunchDuration} morningBreakAfterSlot={calc.morningBreakAfterSlot} morningBreakDuration={morningBreak} afternoonBreakAfterSlot={-1} afternoonBreakDuration={0} startHour={startHour} startMin={startMin} meetingDuration={meetingDuration} transitionDuration={transitionTime} />
                  <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 6, fontStyle: "italic" }}>Ends at {fmtHalfEnd()} — lunch/closing follows</div>
                </div>
              )}

              <div style={{ marginTop: 16, padding: 14, background: COLORS.surfaceLight, borderRadius: 8, border: `1px solid ${COLORS.border}` }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.text, marginBottom: 6 }}>⚡ Routing Logic</div>
                <div style={{ fontSize: 12, color: COLORS.textDim, lineHeight: 1.6 }}>
                  {calc.numGroups} groups rotate through {vendors} vendor suites.
                  {calc.canAllMeetSimultaneously ? ` All ${calc.numGroups} groups meet simultaneously each slot (${calc.numGroups} < ${vendors} vendors), so no conflicts.` : ` ⚠️ More groups (${calc.numGroups}) than vendors (${vendors}) — some groups will have gaps.`}
                  {" "}Each group follows a unique route, seeing {calc.vendorsToVisit} different vendors.
                  {calc.spareSlots > 0 && ` ${calc.spareSlots} buffer slot${calc.spareSlots > 1 ? 's' : ''} per group for breaks or overflow.`}
                </div>
              </div>

              <div style={{ marginTop: 10, padding: 14, background: COLORS.surfaceLight, borderRadius: 8, border: `1px solid ${COLORS.border}` }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.text, marginBottom: 6 }}>🏪 Vendor Perspective</div>
                <div style={{ fontSize: 12, color: COLORS.textDim, lineHeight: 1.6 }}>
                  Each vendor hosts ~{Math.round((calc.numGroups * calc.vendorsToVisit) / vendors)} group meetings over {calc.totalDaysLabel} days (~{Math.round((calc.numGroups * calc.vendorsToVisit) / vendors / (meetingDays + (halfDay ? 0.5 : 0)))} per day).
                  That's roughly {Math.round((calc.numGroups * calc.vendorsToVisit * groupSize) / vendors)} individual delegate interactions.
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* Presets */}
        <div style={{ background: COLORS.surface, borderRadius: 12, border: `1px solid ${COLORS.border}`, padding: 20, marginTop: 20 }}>
          <h3 style={{ margin: "0 0 14px", fontSize: 13, color: COLORS.accent, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "'JetBrains Mono', monospace" }}>Quick Scenarios</h3>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {[
              { label: "Board's Vision (15 min)", action: () => { setMeetingDuration(15); setTransitionTime(5); setMeetingDays(2); setHalfDay(true); setGroupSize(4); setStartHour(8); setStartMin(30); setEndHour(15); setEndMin(0); } },
              { label: "Speed Round (10 min)", action: () => { setMeetingDuration(10); setTransitionTime(5); setMeetingDays(2); setHalfDay(true); setGroupSize(4); setStartHour(9); setStartMin(0); setEndHour(14); setEndMin(30); } },
              { label: "Intimate (groups of 2)", action: () => { setGroupSize(2); setMeetingDuration(12); setTransitionTime(5); setMeetingDays(2); setHalfDay(true); } },
              { label: "2 Full + Half (default)", action: () => { setMeetingDays(2); setHalfDay(true); setMeetingDuration(15); setTransitionTime(5); setStartHour(9); setStartMin(0); setEndHour(14); setEndMin(30); setGroupSize(4); } },
              { label: "2 Full Days Only", action: () => { setMeetingDays(2); setHalfDay(false); setMeetingDuration(12); setTransitionTime(5); setStartHour(9); setStartMin(0); setEndHour(14); setEndMin(30); setGroupSize(4); } },
            ].map((preset) => (
              <button key={preset.label} onClick={preset.action}
                style={{ padding: "8px 16px", background: COLORS.surfaceLight, color: COLORS.text, border: `1px solid ${COLORS.border}`, borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 500, transition: "all 0.15s" }}
                onMouseOver={(e) => { e.target.style.borderColor = COLORS.accent; e.target.style.color = COLORS.accent; }}
                onMouseOut={(e) => { e.target.style.borderColor = COLORS.border; e.target.style.color = COLORS.text; }}>
                {preset.label}
              </button>
            ))}
          </div>
        </div>

        <div style={{ marginTop: 20, padding: 16, fontSize: 12, color: COLORS.textDim, lineHeight: 1.6, textAlign: "center", opacity: 0.6 }}>
          CSC Conference Suite Meeting Calculator · Hilton Toronto Airport 2027
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
